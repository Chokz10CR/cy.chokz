<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulación de Laboratorio - Alerta de Seguridad</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            padding-top: 100px; 
            margin: 0; 
        }
        .box { 
            border: 2px solid #0f0; 
            padding: 20px; 
            display: inline-block; 
            background: #050505; 
            max-width: 80%; 
            box-shadow: 0 0 15px #0f0; 
        }
        h1 { color: #f00; font-weight: bold; }
        .data-display { color: #0ff; }
        #btn { 
            background: #f00; 
            color: #fff; 
            padding: 15px 30px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 30px; 
            font-size: 1em; 
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>⚠️ ENTORNO DE SIMULACIÓN DE SEGURIDAD ⚠️</h1>
        <p>Esta es una interfaz estática de demostración para análisis de ingeniería social.</p>
        <p class="data-display">ESTADO DEL SISTEMA: <span id="status">Evaluando...</span></p>
        <button id="btn" onclick="ejecutarDemostracion()">Iniciar Simulación de Alerta</button>
    </div>

    <script>
        function ejecutarDemostracion() {
            // Cambia el estado visual de la interfaz de forma segura
            document.getElementById('status').innerText = "Simulación Activada (Ver Consola)";
            document.getElementById('status').style.color = "#f00";
            
            // Registro educativo en la consola del desarrollador (F12)
            console.log("[LABORATORIO] El usuario interactuó con el elemento.");
            console.log("[LABORATORIO] En una muestra real, aquí se activaría el análisis de variables de entorno.");
        }
    </script>
</body>
</html>
